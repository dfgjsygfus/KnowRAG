<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KnowRAG Admin Console</title>
<style>
:root {
  --page-bg: #e8ddd0;
  --surface: rgba(255, 251, 247, 0.94);
  --fg: #4a3728;
  --fg-secondary: #8b7355;
  --border-light: rgba(210, 180, 150, 0.35);
  --accent: #e8967a;
  --accent-hover: #d8806e;
  --accent-pressed: #c87060;
  --accent-glow: rgba(232, 150, 122, 0.18);
  --success: #7eb87e;
  --warning: #e0a860;
  --danger: #d47060;
  --sidebar-bg: rgba(240, 232, 220, 0.62);
  --sidebar-active: rgba(232, 150, 122, 0.16);
  --sidebar-hover: rgba(180, 140, 100, 0.09);
  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --radius-full: 980px;
  --shadow: 0 2px 12px rgba(140, 100, 60, 0.10);
  --shadow-md: 0 4px 20px rgba(140, 100, 60, 0.14);
  --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 30% 20%, #f5ede0 0%, transparent 60%),
    radial-gradient(ellipse at 70% 60%, #fdf3e8 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, #efe3d4 0%, transparent 55%),
    linear-gradient(160deg, #e8ddd0 0%, #f0e8dc 30%, #e2d5c4 70%, #dbcebe 100%);
  color: var(--fg);
  font: 14px/1.47 var(--font-body);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.45;
  pointer-events: none;
  z-index: 0;
}

.app-shell { display: flex; height: 100vh; overflow: hidden; position: relative; z-index: 1; }
.sidebar {
  width: 256px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
  backdrop-filter: blur(28px) saturate(160%);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
  border-right: 1px solid rgba(210, 180, 150, 0.3);
  display: flex;
  flex-direction: column;
  user-select: none;
}
.sidebar-header { padding: 28px 24px 20px; }
.logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: grid;
  place-items: center;
  color: #fff;
  font-size: 20px;
  line-height: 1;
  box-shadow: 0 2px 8px rgba(232, 150, 122, 0.35);
}
.logo-label { font: 600 15px/1.2 var(--font-display); color: var(--fg); }
.logo-sub { font: 12px/1.3 var(--font-body); color: var(--fg-secondary); margin-left: 44px; }
.sidebar-nav { flex: 1; padding: 8px 16px; display: flex; flex-direction: column; gap: 2px; }
.nav-label {
  font: 600 11px/1.3 var(--font-body);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-secondary);
  padding: 20px 12px 8px;
}
.sidebar-nav button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 12px;
  border: 0;
  border-radius: 10px;
  background: transparent;
  color: var(--fg);
  font: 13.5px/1.3 var(--font-body);
  cursor: pointer;
  text-align: left;
  transition: all 0.18s ease;
}
.sidebar-nav button:hover { background: var(--sidebar-hover); transform: translateX(2px); }
.sidebar-nav button.active { background: var(--sidebar-active); font-weight: 590; color: var(--accent); }
.nav-icon { width: 20px; height: 20px; display: grid; place-items: center; color: var(--fg-secondary); }
.sidebar-nav button.active .nav-icon { color: var(--accent); }
.nav-badge {
  margin-left: auto;
  background: rgba(232, 150, 122, 0.15);
  color: var(--accent);
  font: 590 11px/1 var(--font-body);
  padding: 3px 8px;
  border-radius: 999px;
  min-width: 22px;
  text-align: center;
}
.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(210, 180, 150, 0.25);
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(232, 150, 122, 0.18);
  display: grid;
  place-items: center;
  font-size: 16px;
  line-height: 1;
  color: var(--accent);
}
.user-info { font: 12px/1.3 var(--font-body); }
.user-info span { display: block; font-size: 11px; color: var(--fg-secondary); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.main-header {
  padding: 20px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.main-header h1 { font: 600 26px/1.15 var(--font-display); color: var(--fg); letter-spacing: -0.01em; }
.header-meta { font: 13px/1.3 var(--font-body); color: var(--fg-secondary); margin-top: 4px; }
.main-body { flex: 1; overflow-y: auto; padding: 0 36px 36px; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(210, 180, 150, 0.2);
  display: flex;
  align-items: center;
  gap: 16px;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 22px rgba(140, 100, 60, 0.16);
}
.stat-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: rgba(232, 150, 122, 0.1);
  color: var(--accent);
}
.stat-value { font: 600 28px/1.1 var(--font-display); color: var(--fg); }
.stat-label { font: 13px/1.3 var(--font-body); color: var(--fg-secondary); }
.stat-sub { font: 11px/1.3 var(--font-body); color: var(--fg-secondary); margin-top: 2px; }

.section-card {
  background: var(--surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  border: 1px solid rgba(210, 180, 150, 0.22);
  overflow: hidden;
  margin-bottom: 24px;
}
.section-card-header {
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-light);
  background: rgba(250, 245, 240, 0.4);
}
.section-card-header h2 { font: 600 16px/1.2 var(--font-display); }

.upload-zone {
  margin: 24px;
  border: 2px dashed rgba(210, 180, 150, 0.45);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  background: rgba(250, 245, 240, 0.4);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(232, 150, 122, 0.08);
  transform: scale(1.008);
}
.upload-icon-circle {
  width: 56px;
  height: 56px;
  margin: 0 auto 16px;
  background: rgba(232, 150, 122, 0.12);
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--accent);
  transition: transform 0.25s ease;
}
.upload-zone:hover .upload-icon-circle { transform: translateY(-3px); }
.upload-zone p { font: 15px/1.4 var(--font-body); color: var(--fg); }
.browse-link { color: var(--accent); font-weight: 500; }
.hint { font: 12px/1.4 var(--font-body); color: var(--fg-secondary); margin-top: 6px; }

.toolbar { display: flex; align-items: center; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
.spacer { flex: 1; }
.search-box { position: relative; display: inline-flex; align-items: center; }
.search-icon { position: absolute; left: 14px; pointer-events: none; color: #8e8e93; }
.search-input,
.retrieval-input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid rgba(210, 180, 150, 0.4);
  border-radius: 10px;
  background: rgba(250, 245, 240, 0.7);
  color: var(--fg);
  font: 14px/1.4 var(--font-body);
  outline: none;
  transition: all 0.2s ease;
}
.search-input { width: 260px; padding-left: 38px; }
.search-input:focus,
.retrieval-input:focus {
  border-color: var(--accent);
  background: rgba(255, 251, 247, 0.95);
  box-shadow: 0 0 0 4px var(--accent-glow);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 18px;
  border: 0;
  border-radius: var(--radius-full);
  background: rgba(240, 232, 220, 0.7);
  color: var(--fg);
  font: 590 13px/1.3 var(--font-body);
  cursor: pointer;
  transition: all 0.18s ease;
  white-space: nowrap;
}
.btn:hover { background: rgba(220, 200, 180, 0.5); transform: translateY(-1px); }
.btn:active { transform: scale(0.97); }
.btn:disabled { cursor: not-allowed; opacity: 0.45; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(232, 150, 122, 0.35); }
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 14px rgba(232, 150, 122, 0.45); }
.btn-primary:active { background: var(--accent-pressed); transform: scale(0.96); }
.btn-danger { background: rgba(255, 240, 238, 0.8); color: var(--danger); }
.btn-danger:hover { background: rgba(240, 210, 200, 0.6); }
.btn-ghost { background: transparent; color: var(--fg-secondary); }
.btn-ghost:hover { background: rgba(180, 140, 100, 0.08); color: var(--fg); }
.btn-sm { padding: 5px 13px; font-size: 12px; }

.data-table { width: 100%; border-collapse: collapse; font: 14px/1.4 var(--font-body); }
.data-table th {
  text-align: left;
  padding: 10px 24px;
  font: 590 11px/1.3 var(--font-body);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-secondary);
  border-bottom: 2px solid rgba(210, 180, 150, 0.3);
  background: rgba(250, 245, 240, 0.5);
}
.data-table td {
  padding: 12px 24px;
  border-bottom: 1px solid rgba(210, 180, 150, 0.18);
  color: var(--fg);
  vertical-align: middle;
}
.data-table tbody tr:hover td { background: rgba(250, 245, 240, 0.55); }
.data-table tbody tr { transition: background 0.15s ease; }
.cell-name { display: flex; align-items: center; gap: 12px; font-weight: 500; }
.file-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: rgba(232, 150, 122, 0.1);
  display: grid;
  place-items: center;
  color: var(--accent);
  flex-shrink: 0;
}
.cell-actions { display: flex; gap: 4px; }
.mono { font-family: var(--font-mono); font-size: 11px; }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font: 590 12px/1.3 var(--font-body);
  background: rgba(240, 232, 220, 0.6);
  color: var(--fg-secondary);
}
.status-pill::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #c4b09a; }
.status-pill.ready { background: rgba(126, 184, 126, 0.15); color: #5a8a5a; }
.status-pill.ready::before { background: var(--success); }
.status-pill.indexing { background: rgba(224, 168, 96, 0.15); color: #b08840; }
.status-pill.indexing::before { background: var(--warning); }
.status-pill.failed { background: rgba(212, 112, 96, 0.12); color: #b05848; }
.status-pill.failed::before { background: var(--danger); }

.detail-panel {
  margin: 24px;
  background: rgba(250, 245, 240, 0.55);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(210, 180, 150, 0.2);
  overflow: hidden;
}
.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: rgba(240, 232, 220, 0.5);
  font: 590 13px/1.3 var(--font-body);
}
.detail-meta { font: 11px var(--font-mono); color: var(--fg-secondary); }
.detail-panel pre {
  font: 12px/1.6 var(--font-mono);
  padding: 20px;
  margin: 0;
  overflow-x: auto;
  white-space: pre-wrap;
  max-height: 440px;
  overflow-y: auto;
  color: var(--fg);
  background: rgba(255, 251, 247, 0.5);
}
.result-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
  padding: 18px 20px;
}
.retrieval-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 96px auto;
  gap: 12px;
  padding: 20px 24px;
  align-items: center;
}
.retrieval-results {
  display: grid;
  gap: 12px;
  padding: 0 24px 24px;
}
.retrieval-result {
  border: 1px solid var(--border-light);
  border-radius: 14px;
  background: rgba(255, 251, 247, 0.7);
  overflow: hidden;
  transition: box-shadow 0.2s ease;
}
.retrieval-result:hover { box-shadow: 0 4px 16px rgba(140, 100, 60, 0.12); }
.retrieval-result-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(250, 245, 240, 0.5);
  border-bottom: 1px solid var(--border-light);
}
.retrieval-result-title { font: 590 13px/1.35 var(--font-body); }
.retrieval-score { font: 12px/1.3 var(--font-mono); color: var(--accent); }
.retrieval-result-body {
  padding: 14px 16px;
  font: 12px/1.65 var(--font-mono);
  white-space: pre-wrap;
  color: var(--fg);
}
.settings-form {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  padding: 24px;
}
.settings-field { display: grid; gap: 7px; }
.settings-field label {
  font: 590 12px/1.3 var(--font-body);
  color: var(--fg-secondary);
}
.settings-field select.retrieval-input { cursor: pointer; }
.settings-field.full { grid-column: 1 / -1; }
.settings-actions {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  padding-top: 4px;
}
.settings-note {
  margin-right: auto;
  color: var(--fg-secondary);
  font: 12px/1.5 var(--font-body);
}
.result-item {
  background: rgba(255, 251, 247, 0.7);
  border: 1px solid rgba(210, 180, 150, 0.25);
  border-radius: 14px;
  padding: 12px;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.result-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(140, 100, 60, 0.12);
}
.result-item b { display: block; font: 600 18px/1.2 var(--font-display); color: var(--accent); }
.result-item span { font: 12px/1.3 var(--font-body); color: var(--fg-secondary); }
.empty-state { text-align: center; padding: 64px 24px; color: var(--fg-secondary); }
.empty-icon-circle {
  width: 72px;
  height: 72px;
  margin: 0 auto 20px;
  background: rgba(232, 150, 122, 0.1);
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--accent);
  font-size: 32px;
  transition: transform 0.3s ease;
}
.empty-state:hover .empty-icon-circle { transform: scale(1.08); }
.empty-state h3 { font: 600 16px/1.3 var(--font-display); color: var(--fg); margin-bottom: 6px; }
.toast-container {
  position: fixed;
  top: 28px;
  right: 28px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: rgba(255, 251, 247, 0.94);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: var(--fg);
  padding: 14px 20px;
  border-radius: 14px;
  font: 14px/1.3 var(--font-body);
  border: 1px solid rgba(210, 180, 150, 0.35);
  box-shadow: 0 8px 32px rgba(140, 100, 60, 0.18);
  animation: toastIn 0.3s ease-out;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(180, 140, 100, 0.25); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(180, 140, 100, 0.4); }

@media (max-width: 960px) {
  .sidebar { width: 220px; }
  .main-header, .main-body { padding-left: 22px; padding-right: 22px; }
  .stats-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .result-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .retrieval-form { grid-template-columns: minmax(0, 1fr); }
}
@media (max-width: 780px) {
  .data-table { display: block; overflow-x: auto; }
  .retrieval-form { grid-template-columns: minmax(0, 1fr); gap: 10px; }
  .settings-form { grid-template-columns: minmax(0, 1fr); }
  .retrieval-results { padding: 0 16px 16px; }
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <div class="logo-icon">🐶</div>
        <span class="logo-label">KnowRAG</span>
      </div>
      <div class="logo-sub">Admin Console</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">功能</div>
      <button class="active" id="nav-documents">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/></svg>
        </span>
        文档入库
        <span class="nav-badge" id="file-badge">0</span>
      </button>
      <button id="nav-milvus">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 9h8M8 13h5"/></svg>
        </span>
        Milvus
        <span class="nav-badge" id="stored-badge">0</span>
      </button>
      <button id="nav-settings">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.34 1.88l.04.04a2 2 0 01-2.83 2.83l-.04-.04A1.7 1.7 0 0015 19.4a1.7 1.7 0 00-1 .6 1.7 1.7 0 00-.4 1.1V21a2 2 0 01-4 0v-.06a1.7 1.7 0 00-.4-1.1 1.7 1.7 0 00-1-.6 1.7 1.7 0 00-1.88.34l-.04.04a2 2 0 01-2.83-2.83l.04-.04A1.7 1.7 0 004.6 15a1.7 1.7 0 00-.6-1 1.7 1.7 0 00-1.1-.4H3a2 2 0 010-4h.06a1.7 1.7 0 001.1-.4 1.7 1.7 0 00.6-1 1.7 1.7 0 00-.34-1.88l-.04-.04a2 2 0 012.83-2.83l.04.04A1.7 1.7 0 009 4.6a1.7 1.7 0 001-.6 1.7 1.7 0 00.4-1.1V3a2 2 0 014 0v.06a1.7 1.7 0 00.4 1.1 1.7 1.7 0 001 .6 1.7 1.7 0 001.88-.34l.04-.04a2 2 0 012.83 2.83l-.04.04A1.7 1.7 0 0019.4 9c.23.37.57.7 1 .9.33.16.7.24 1.1.24H21a2 2 0 010 4h-.06a1.7 1.7 0 00-1.1.4 1.7 1.7 0 00-.44.46z"/></svg>
        </span>
        模型设置
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar">🐶</div>
      <div class="user-info">管理员<span>本地离线入库</span></div>
    </div>
  </aside>

  <main class="main">
    <header class="main-header">
      <div>
        <h1>文档入库</h1>
        <div class="header-meta" id="header-meta">上传 Markdown 或文本文件，写入 Milvus 向量库</div>
      </div>
      <button class="btn btn-primary" id="btn-index-all" disabled>全部入库</button>
    </header>

    <div class="main-body">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
          </div>
          <div><div class="stat-value" id="stat-files">0</div><div class="stat-label">文件数</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
          </div>
          <div><div class="stat-value" id="stat-stored">0</div><div class="stat-label">已入库</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M9 9h6v6H9z"/></svg>
          </div>
          <div><div class="stat-value" id="stat-chunks">0</div><div class="stat-label">Chunk</div><div class="stat-sub">最近结果</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
          </div>
          <div><div class="stat-value" id="stat-vectors">0</div><div class="stat-label">向量</div><div class="stat-sub">4096 维</div></div>
        </div>
      </div>

      <div class="section-card">
        <div class="upload-zone" id="upload-zone">
          <div class="upload-icon-circle">
            <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          </div>
          <p>拖拽文件到此处，或 <span class="browse-link">点击浏览</span> 🐶</p>
          <p class="hint">支持 .md / .markdown / .txt，上传后可预览并写入 Milvus</p>
        </div>
        <input type="file" accept=".md,.markdown,.txt" id="file-input" hidden multiple>
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" class="search-input" placeholder="搜索文件或内容" id="file-search">
          </div>
          <span class="spacer"></span>
          <button class="btn btn-ghost" id="btn-clear">清空</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>文件名</th>
              <th>状态</th>
              <th style="width:90px;">大小</th>
              <th style="width:170px;">入库结果</th>
              <th style="width:220px;"></th>
            </tr>
          </thead>
          <tbody id="file-table-body"></tbody>
        </table>
        <div class="empty-state" id="empty-state">
          <div class="empty-icon-circle">🐾</div>
          <h3>还没有文档 🐾</h3>
          <p>汪！上传一个 Markdown 文件，旺财帮你记住它们。</p>
        </div>
      </div>

      <div id="detail-area" style="display:none;"></div>
    </div>
  </main>
</div>
<div class="toast-container" id="toast-container"></div>

<script src="/admin/app.js"></script>
